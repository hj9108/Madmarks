<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Test Answer Sheet</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:28px 20px;text-align:center;color:#fff;box-shadow:0 4px 20px rgba(102,126,234,.4)}
        .header h1{font-size:26px;font-weight:700;margin-bottom:4px}
        .header p{font-size:13px;opacity:.85}

        .container{max-width:760px;margin:0 auto;padding:15px}

        .panel{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
        .panel h3{font-size:15px;font-weight:700;margin-bottom:10px}
        .panel .hint{font-size:11px;color:#94a3b8;margin:-6px 0 10px}

        .config-row{display:flex;gap:20px;flex-wrap:wrap}
        .config-item{display:flex;flex-direction:column;gap:4px}
        .config-item label{font-size:12px;font-weight:600;color:#64748b}
        .config-item input[type=number]{width:80px;padding:8px 10px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;font-weight:600;text-align:center;outline:none;transition:border-color .2s}
        .config-item input[type=number]:focus{border-color:#667eea}

        .import-row{display:flex;gap:8px;flex-wrap:wrap}
        .import-row input[type=text]{flex:1;min-width:180px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:'Courier New',monospace;letter-spacing:2px;outline:none;transition:border-color .2s}
        .import-row input[type=text]:focus{border-color:#667eea}

        .btn{padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
        .btn:active{transform:scale(.96)}
        .btn-primary{background:#667eea;color:#fff}
        .btn-primary:hover{background:#5a6fd6}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-danger:hover{background:#dc2626}
        .btn-outline{background:#fff;color:#64748b;border:2px solid #e2e8f0}
        .btn-outline:hover{background:#f8fafc;border-color:#cbd5e1}

        .stats-bar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:14px;padding:14px 10px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.08);display:flex;justify-content:space-around;flex-wrap:wrap;gap:6px}
        .stat{text-align:center;min-width:60px}
        .stat-label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;font-weight:700;margin-bottom:2px}
        .stat-value{font-size:22px;font-weight:800;line-height:1.2}
        .stat-value small{font-size:12px;font-weight:600;opacity:.55}
        .clr-blue{color:#667eea}.clr-green{color:#10b981}.clr-red{color:#ef4444}.clr-purple{color:#8b5cf6}.clr-amber{color:#f59e0b}

        .progress-wrap{background:#e2e8f0;border-radius:10px;height:5px;margin-bottom:14px;overflow:hidden}
        .progress-fill{height:100%;width:0;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .4s ease}

        .q-container{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px}

        .q-row{display:flex;align-items:center;padding:7px 12px;gap:7px;border-bottom:1px solid #f1f5f9;transition:background .3s}
        .q-row:last-child{border-bottom:none}
        .q-row:nth-child(even){background:#fafbfd}
        .q-row.row-correct{background:#ecfdf5!important}
        .q-row.row-wrong{background:#fef2f2!important}

        .q-num{min-width:32px;font-size:13px;font-weight:700;color:#94a3b8;text-align:right;padding-right:2px}

        .q-opts{display:flex;gap:5px}

        .opt-btn{width:34px;height:34px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;color:#475569;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:0}
        .opt-btn:hover{border-color:#667eea;background:#f0f1ff;color:#667eea}
        .opt-btn:active{transform:scale(.88)}
        .opt-btn.selected{background:#667eea;border-color:#667eea;color:#fff;box-shadow:0 2px 8px rgba(102,126,234,.35)}

        .q-ans{display:flex;align-items:center;gap:1px;margin-left:auto}
        .bracket{font-size:18px;font-weight:800;color:#cbd5e1;user-select:none;line-height:1}

        .ans-input{width:28px;height:28px;border:2px solid #e2e8f0;border-radius:6px;text-align:center;font-size:13px;font-weight:700;text-transform:uppercase;outline:none;transition:all .2s;padding:0;color:#1a1a2e;background:#f8fafc}
        .ans-input:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,.15)}

        .q-result{min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border-radius:50%}
        .q-result.res-correct{color:#10b981;background:#ecfdf5}
        .q-result.res-wrong{color:#ef4444;background:#fef2f2}

        .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}

        .scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:#667eea;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 15px rgba(102,126,234,.4);display:none;align-items:center;justify-content:center;z-index:99;transition:all .3s}
        .scroll-top.visible{display:flex}
        .scroll-top:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(102,126,234,.5)}

        @keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
        .q-result.animate{animation:pop .3s ease forwards}

        @media(max-width:520px){
            .header h1{font-size:20px}.header{padding:20px 15px}
            .stats-bar{padding:10px 4px;gap:4px}.stat{min-width:52px}.stat-value{font-size:17px}.stat-label{font-size:9px}
            .q-row{padding:5px 7px;gap:4px}.q-num{min-width:26px;font-size:11px}
            .opt-btn{width:28px;height:28px;font-size:11px;border-radius:6px}
            .ans-input{width:24px;height:24px;font-size:11px}.bracket{font-size:14px}
            .q-result{min-width:24px;height:24px;font-size:14px}
            .config-row{flex-direction:column;gap:10px}.import-row{flex-direction:column}
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📝 Online Test Answer Sheet</h1>
    <p>Mark your answers → Enter correct answers in [ ] → Get instant results</p>
</div>

<div class="container">

    <div class="panel">
        <h3>⚙️ Marking Scheme</h3>
        <div class="config-row">
            <div class="config-item">
                <label>+ Marks per Correct</label>
                <input type="number" id="cmInput" value="4" min="0" step="0.25"
                       oninput="recalc()">
            </div>
            <div class="config-item">
                <label>− Penalty per Wrong</label>
                <input type="number" id="wmInput" value="1" min="0" step="0.25"
                       oninput="recalc()">
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>📋 Quick Import Answer Key</h3>
        <p class="hint">Paste correct answers in order (e.g. ABCDABCD…). Non A-D characters are ignored.</p>
        <div class="import-row">
            <input type="text" id="keyInput" placeholder="ABCDA BCDAB CDABC…"
                   spellcheck="false" autocomplete="off">
            <div style="display:flex;gap:6px">
                <button class="btn btn-primary" onclick="importKey()">Import</button>
                <button class="btn btn-outline" onclick="clearKey()">Clear Key</button>
            </div>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat">
            <span class="stat-label">Attempted</span>
            <span class="stat-value clr-blue" id="sAtt">0<small>/100</small></span>
        </div>
        <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value clr-green" id="sCor">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Wrong</span>
            <span class="stat-value clr-red" id="sWrn">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Score</span>
            <span class="stat-value clr-purple" id="sScr">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value clr-amber" id="sAcc">0%</span>
        </div>
    </div>

    <div class="progress-wrap"><div class="progress-fill" id="progBar"></div></div>

    <div class="q-container" id="qBox"></div>

    <div class="actions">
        <button class="btn btn-danger" onclick="resetAll()">🔄 Reset Everything</button>
        <button class="btn btn-outline" onclick="clearMine()">Clear My Answers</button>
        <button class="btn btn-outline" onclick="clearKey()">Clear Answer Key</button>
    </div>
</div>

<button class="scroll-top" id="scrollBtn"
        onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const T=100;
let mk={},ck={};

document.addEventListener('DOMContentLoaded',()=>{
    loadSave();
    build();
    restore();
    recalc();
    window.addEventListener('scroll',()=>{
        document.getElementById('scrollBtn').classList.toggle('visible',window.scrollY>400);
    });
});

/* ---- BUILD ---- */
function build(){
    const box=document.getElementById('qBox');
    box.innerHTML='';
    for(let i=1;i<=T;i++){
        const r=document.createElement('div');
        r.className='q-row';r.id='r'+i;
        r.innerHTML=`
            <div class="q-num">${i}</div>
            <div class="q-opts">
                <button class="opt-btn" id="o${i}A" onclick="sel(${i},'A')">A</button>
                <button class="opt-btn" id="o${i}B" onclick="sel(${i},'B')">B</button>
                <button class="opt-btn" id="o${i}C" onclick="sel(${i},'C')">C</button>
                <button class="opt-btn" id="o${i}D" onclick="sel(${i},'D')">D</button>
            </div>
            <div class="q-ans">
                <span class="bracket">[</span>
                <input class="ans-input" id="c${i}" maxlength="1" autocomplete="off" spellcheck="false">
                <span class="bracket">]</span>
            </div>
            <div class="q-result" id="x${i}"></div>`;
        box.appendChild(r);
        wire(i);
    }
}

function wire(n){
    const inp=document.getElementById('c'+n);
    inp.addEventListener('keydown',function(e){
        const k=e.key.toUpperCase();
        if('ABCD'.includes(k)&&k.length===1){
            e.preventDefault();this.value=k;ck[n]=k;
            show(n);recalc();save();
            if(n<T)document.getElementById('c'+(n+1)).focus();
        }else if(e.key==='Backspace'||e.key==='Delete'){
            e.preventDefault();this.value='';delete ck[n];
            show(n);recalc();save();
            if(e.key==='Backspace'&&n>1)document.getElementById('c'+(n-1)).focus();
        }else if(e.key==='ArrowUp'&&n>1){
            e.preventDefault();document.getElementById('c'+(n-1)).focus();
        }else if(e.key==='ArrowDown'&&n<T){
            e.preventDefault();document.getElementById('c'+(n+1)).focus();
        }else if(e.key!=='Tab'){e.preventDefault();}
    });
    inp.addEventListener('paste',e=>e.preventDefault());
    inp.addEventListener('drop',e=>e.preventDefault());
}

/* ---- SELECT OPTION ---- */
function sel(n,o){
    if(mk[n]===o){delete mk[n];document.getElementById('o'+n+o).classList.remove('selected');}
    else{'ABCD'.split('').forEach(x=>document.getElementById('o'+n+x).classList.remove('selected'));
        mk[n]=o;document.getElementById('o'+n+o).classList.add('selected');}
    show(n);recalc();save();
}

/* ---- SHOW RESULT ---- */
function show(n){
    const el=document.getElementById('x'+n),rw=document.getElementById('r'+n);
    rw.classList.remove('row-correct','row-wrong');
    el.classList.remove('res-correct','res-wrong','animate');
    if(mk[n]&&ck[n]){
        void el.offsetWidth;
        if(mk[n]===ck[n]){el.textContent='✓';el.classList.add('res-correct','animate');rw.classList.add('row-correct');}
        else{el.textContent='✗';el.classList.add('res-wrong','animate');rw.classList.add('row-wrong');}
    }else{el.textContent='';}
}

/* ---- STATS ---- */
function recalc(){
    let att=0,cor=0,wrn=0;
    for(let i=1;i<=T;i++){
        if(mk[i]){att++;if(ck[i]){if(mk[i]===ck[i])cor++;else wrn++;}}
    }
    const cm=parseFloat(document.getElementById('cmInput').value)||0;
    const wm=parseFloat(document.getElementById('wmInput').value)||0;
    const sc=(cor*cm)-(wrn*wm);
    const chk=cor+wrn;
    const acc=chk>0?((cor/chk)*100).toFixed(1):'0.0';
    document.getElementById('sAtt').innerHTML=att+'<small>/'+T+'</small>';
    document.getElementById('sCor').textContent=cor;
    document.getElementById('sWrn').textContent=wrn;
    document.getElementById('sScr').textContent=sc%1===0?sc:sc.toFixed(2);
    document.getElementById('sAcc').textContent=acc+'%';
    document.getElementById('progBar').style.width=((att/T)*100)+'%';
}

/* ---- IMPORT / CLEAR ---- */
function importKey(){
    const raw=document.getElementById('keyInput').value.toUpperCase().replace(/[^ABCD]/g,'');
    if(!raw){alert('Enter a valid key using A, B, C, D only.');return;}
    const len=Math.min(raw.length,T);
    for(let i=0;i<len;i++){ck[i+1]=raw[i];document.getElementById('c'+(i+1)).value=raw[i];show(i+1);}
    recalc();save();
    alert('✅ Imported '+len+' answer(s)!');
}

function clearKey(){
    if(!Object.keys(ck).length)return;
    if(!confirm('Clear all correct answers?'))return;
    for(let i=1;i<=T;i++){delete ck[i];document.getElementById('c'+i).value='';show(i);}
    document.getElementById('keyInput').value='';recalc();save();
}

function clearMine(){
    if(!Object.keys(mk).length)return;
    if(!confirm('Clear all your marked answers?'))return;
    for(let i=1;i<=T;i++){delete mk[i];'ABCD'.split('').forEach(o=>document.getElementById('o'+i+o).classList.remove('selected'));show(i);}
    recalc();save();
}

function resetAll(){
    if(!confirm('Reset everything?'))return;
    mk={};ck={};
    for(let i=1;i<=T;i++){'ABCD'.split('').forEach(o=>document.getElementById('o'+i+o).classList.remove('selected'));
        document.getElementById('c'+i).value='';show(i);}
    document.getElementById('keyInput').value='';
    document.getElementById('cmInput').value=4;
    document.getElementById('wmInput').value=1;
    recalc();localStorage.removeItem('tAS');
}

/* ---- STORAGE ---- */
function save(){try{localStorage.setItem('tAS',JSON.stringify({mk,ck,cm:document.getElementById('cmInput').value,wm:document.getElementById('wmInput').value}));}catch(e){}}
function loadSave(){try{const d=JSON.parse(localStorage.getItem('tAS'));if(d){mk=d.mk||{};ck=d.ck||{};if(d.cm)document.getElementById('cmInput').value=d.cm;if(d.wm)document.getElementById('wmInput').value=d.wm;}}catch(e){}}
function restore(){for(const[n,o]of Object.entries(mk)){const b=document.getElementById('o'+n+o);if(b)b.classList.add('selected');}
    for(const[n,a]of Object.entries(ck)){const inp=document.getElementById('c'+n);if(inp)inp.value=a;show(parseInt(n));}}
</script>
</body>
</html>
